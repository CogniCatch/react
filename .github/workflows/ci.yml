name: CI Checks

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Code
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type Check (TypeScript)

        run: pnpm exec tsc --noEmit 

      - name: Lint & Format (Biome)

        run: pnpm run check

      - name: Unit Tests (Vitest)

        run: pnpm run test

      - name: Build Library (Vite)

        run: pnpm run build
